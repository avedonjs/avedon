name: Release

on:
  push:
    branches: [main, master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Required for npm Trusted Publisher (OIDC). Do not set NPM_TOKEN —
  # changesets/action skips OIDC when NPM_TOKEN is present.
  id-token: write

jobs:
  release:
    name: Version & publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      # Trusted publishing (OIDC) needs Node ≥22.14 and npm ≥11.5.1
      # No registry-url: setup-node would write an auth .npmrc that blocks OIDC.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Trusted publishing needs npm ≥11.5.1. Do NOT use npm@latest (12+):
      # pnpm 9 forwards --git-checks to npm publish; npm 12 throws EUNKNOWNCONFIG.
      - name: Install npm 11 for publish (OIDC + git-checks compat)
        run: npm install -g npm@11

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provenance is automatic with trusted publishing; keep explicit for clarity.
          NPM_CONFIG_PROVENANCE: true
