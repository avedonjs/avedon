# Deploy apps/www (SSG) to Cloudflare Pages — https://avedon.pages.dev

name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/www/**'
      - 'docs/*.md'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Bins are skipped at first install when package dist/ is missing; relink after build.
      - name: Relink workspace bins
        run: pnpm install --frozen-lockfile

      - name: Build www
        run: pnpm -F www build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/www/build/client --project-name=avedon --branch=main
